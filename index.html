<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign in with MyEQ — demo</title>
	</head>
	<body>
		<main class="card">
			<!-- ── Signed-out view ─────────────────────────────────────────── -->
			<section id="signed-out">
				<h1>Sign in with MyEQ</h1>
				<p class="subtitle">
					A minimal example Relying Party. Click the button to start the
					OpenID Connect flow (Authorization Code + PKCE).
				</p>
				<div class="actions">
					<!--
						The button is plain HTML + CSS (see src/signin-button.css).
						Copy this markup into your app and wire the click to your
						OIDC client's signinRedirect().
					-->
					<button
						id="signin-button"
						type="button"
						class="eq-signin eq-signin--light eq-signin--md eq-signin--rounded"
						aria-label="Sign in with MyEQ"
					>
						<span class="eq-signin__logo" aria-hidden="true">
							<svg viewBox="0 0 512 512" role="presentation">
								<rect width="512" height="512" rx="104" fill="#e42528" />
								<path
									fill="#ffffff"
									d="M365.6,381.5c-6.6-6.4-15.3-9.9-24.5-9.9l-205,.3v70.6l205-.3c9.4,0,18.3-3.7,24.9-10.3,6.4-6.4,10.1-15.6,10-25.2,0-9.6-3.9-18.7-10.4-25.1Z"
								/>
								<path
									fill="#ffffff"
									d="M375.6,104.9v-.2c0-9.6-3.9-18.5-10.7-25.1-6.6-6.5-15.4-10-24.6-10l-204.3.3v70.5l204.3-.2c19.5,0,35.3-15.8,35.3-35.3Z"
								/>
								<path
									fill="#ffffff"
									d="M289.3,280.9c6.4-6.4,10.1-15.5,10-25,0-9.6-3.8-18.8-10.4-25.3-6.6-6.4-15.3-9.9-24.6-9.9l-128.3.2v70.6l128.4-.2c9.4,0,18.3-3.7,24.9-10.3Z"
								/>
							</svg>
						</span>
						<span class="eq-signin__label">Sign in with MyEQ</span>
					</button>
				</div>
			</section>

			<!-- ── Signed-in view ──────────────────────────────────────────── -->
			<section id="signed-in" class="profile hidden">
				<div class="profile__head">
					<div id="avatar" class="profile__avatar"></div>
					<div>
						<div id="profile-name" class="profile__name"></div>
						<div id="profile-email" class="profile__email"></div>
					</div>
				</div>
				<pre id="claims" class="claims"></pre>
				<button id="signout-button" type="button" class="link-button">
					Sign out
				</button>
			</section>
		</main>

		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
