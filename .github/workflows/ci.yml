name: CI

# Builds the example so it can act as a smoke-test target for MyEQ IDP changes.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_OIDC_AUTHORITY: https://auth.europequalitegroup.com
          VITE_OIDC_CLIENT_ID: ci-build-check
